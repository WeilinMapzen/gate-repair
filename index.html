<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電動大門維修記錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;min-height:100vh;padding:1.5rem 1rem}
.form-wrap{max-width:480px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.page{display:none}
.page.active{display:block}
.title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.title-row h2{font-size:18px;font-weight:500;color:#111}
.btn-query{font-size:13px;color:#0F6E56;background:none;border:1px solid #0F6E56;border-radius:6px;padding:4px 10px;cursor:pointer}
.field{margin-bottom:1.25rem}
label.field-label{display:block;font-size:13px;color:#666;margin-bottom:6px}
select,input[type=text],input[type=date],textarea{width:100%;padding:10px 12px;font-size:15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;appearance:none;-webkit-appearance:none;outline:none}
select:focus,input:focus,textarea:focus{border-color:#888}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.checkbox-group,.radio-group{display:flex;flex-direction:column;gap:10px}
.check-item,.radio-item{display:flex;align-items:center;gap:10px;font-size:15px;color:#111;cursor:pointer}
.check-item input,.radio-item input{width:18px;height:18px;flex-shrink:0;cursor:pointer}
.status-normal{color:#0F6E56}
.status-watch{color:#BA7517}
.status-pending{color:#A32D2D}
.btn-submit{width:100%;padding:12px;font-size:16px;font-weight:500;background:#fff;border:1px solid #ccc;border-radius:8px;color:#111;cursor:pointer;margin-top:0.5rem}
.btn-submit:hover{background:#f5f5f5}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}
.success-box{display:none;background:#f0f9f5;border-radius:12px;padding:2rem;text-align:center;margin-top:1rem}
.success-icon{font-size:36px;margin-bottom:0.75rem;color:#0F6E56}
.success-title{font-size:16px;font-weight:500;color:#111;margin-bottom:0.5rem}
.success-sub{font-size:13px;color:#666}
.btn-reset{margin-top:1rem;font-size:14px;color:#666;background:none;border:none;cursor:pointer;text-decoration:underline}
.divider{border:none;border-top:1px solid #eee;margin:1.5rem 0}
.select-wrap{position:relative}
.select-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:#999;font-size:12px}
.error-msg{font-size:13px;color:#A32D2D;margin-top:0.75rem;display:none;text-align:center}
.back-btn{font-size:13px;color:#666;background:none;border:none;cursor:pointer;margin-bottom:1rem;padding:0;text-decoration:underline;display:block}
.query-filter{display:flex;gap:8px;margin-bottom:1.25rem}
.query-filter .select-wrap{flex:1}
.btn-load{padding:10px 16px;font-size:14px;background:#0F6E56;color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn-load:disabled{opacity:0.5}
.record-list{list-style:none}
.record-item{padding:12px 4px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.record-item:last-child{border-bottom:none}
.record-item:active{background:#fafafa}
.record-main{font-size:15px;color:#111;font-weight:500}
.record-sub{font-size:12px;color:#888;margin-top:3px}
.badge{font-size:11px;padding:3px 8px;border-radius:4px;white-space:nowrap;margin-left:8px;flex-shrink:0}
.s-normal{background:#e6f4f0;color:#0F6E56}
.s-watch{background:#fef3e2;color:#BA7517}
.s-pending{background:#fdecea;color:#A32D2D}
.loading{text-align:center;color:#aaa;padding:2rem 0;font-size:14px}
.empty{text-align:center;color:#aaa;padding:2rem 0;font-size:14px}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.detail-header h2{font-size:18px;font-weight:500;color:#111}
.btn-save{font-size:13px;color:#fff;background:#0F6E56;border:none;border-radius:6px;padding:6px 14px;cursor:pointer}
.btn-save:disabled{opacity:0.5}
</style>
</head>
<body>
<div class="form-wrap">

  <!-- 填寫頁面 -->
  <div class="page active" id="page-form">
    <div class="title-row">
      <h2>電動大門維修記錄</h2>
      <button class="btn-query" onclick="showPage('page-query')">查詢記錄</button>
    </div>
    <div id="form-body">
      <div class="field">
        <label class="field-label">區處</label>
        <div class="select-wrap">
          <select id="region" onchange="updateUnits('unit','region')">
            <option value="">請選擇區處</option>
            <option>高雄區處</option><option>鳳山區處</option><option>南分處</option><option>南施處</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">所別</label>
        <div class="select-wrap">
          <select id="unit"><option value="">請先選擇區處</option></select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">位置</label>
        <input type="text" id="location" placeholder="例如：大門、倉庫A、營業廳">
      </div>
      <hr class="divider">
      <div class="field">
        <label class="field-label">故障類別（可複選）</label>
        <div class="checkbox-group" id="cats-form">
          <label class="check-item"><input type="checkbox" value="機械系統"> 機械系統（馬達、滾輪、傳動裝置、限位開關）</label>
          <label class="check-item"><input type="checkbox" value="安全防護"> 安全防護裝置（光電感應、防夾裝置）</label>
          <label class="check-item"><input type="checkbox" value="電氣系統"> 電氣系統（壓扣、電磁、電源或訊號線、控箱、感應線圈）</label>
          <label class="check-item"><input type="checkbox" value="感應裝置"> 感應裝置（紅外線、雷達、無線壓扣）</label>
        </div>
      </div>
      <div class="field">
        <label class="field-label">維修日期</label>
        <input type="date" id="repair-date">
      </div>
      <div class="field">
        <label class="field-label">故障描述</label>
        <textarea id="fault-desc" placeholder="請詳細描述故障情形"></textarea>
      </div>
      <div class="field">
        <label class="field-label">處理方式</label>
        <textarea id="action-taken" placeholder="請描述實際處理方式"></textarea>
      </div>
      <hr class="divider">
      <div class="field">
        <label class="field-label">維修後狀態</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="status" value="正常"> <span class="status-normal">正常</span></label>
          <label class="radio-item"><input type="radio" name="status" value="待追蹤"> <span class="status-watch">待追蹤</span></label>
          <label class="radio-item"><input type="radio" name="status" value="未處理"> <span class="status-pending">未處理</span></label>
        </div>
      </div>
      <button class="btn-submit" id="submit-btn" onclick="submitForm()">送出記錄</button>
      <div class="error-msg" id="error-msg">送出失敗，請檢查網路後再試一次</div>
    </div>
    <div class="success-box" id="success-box">
      <div class="success-icon">✓</div>
      <div class="success-title">記錄已儲存至 Google 試算表</div>
      <div class="success-sub" id="success-detail"></div>
      <button class="btn-reset" onclick="resetForm()">繼續填寫下一筆</button>
    </div>
  </div>

  <!-- 查詢頁面 -->
  <div class="page" id="page-query">
    <div class="title-row">
      <h2>查詢維修記錄</h2>
      <button class="btn-query" onclick="showPage('page-form')">填寫記錄</button>
    </div>
    <div class="query-filter">
      <div class="select-wrap">
        <select id="q-region" onchange="updateUnits('q-unit','q-region')">
          <option value="">請選擇區處</option>
          <option>高雄區處</option><option>鳳山區處</option><option>南分處</option><option>南施處</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="q-unit"><option value="">請先選擇區處</option></select>
      </div>
      <button class="btn-load" id="btn-load" onclick="loadRecords()">搜尋</button>
    </div>
    <div id="query-result"></div>
  </div>

  <!-- 詳細/編輯頁面 -->
  <div class="page" id="page-detail">
    <button class="back-btn" onclick="showPage('page-query')">← 返回列表</button>
    <div class="detail-header">
      <h2>維修詳細記錄</h2>
      <button class="btn-save" id="btn-save" onclick="saveEdit()">儲存修改</button>
    </div>
    <div id="detail-body"></div>
  </div>

</div>
<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbxaqxwSggjUIXlAZ9p_JLfip2fMPAPJ7OXYecyPUYyusA0VQ1tLjjWq9pWIju7piZOI2A/exec';
const units={
  "高雄區處":["嘉定變電所","蚵港變電所","新興變電所","左營變電所","鼓山變電所","大湖變電所","梓官變電所","大岡變電所","鹽埕變電所","橋頭服務所","岡山服務所","梓官服務所","湖內服務所","燕巢服務所","楠梓服務所","鼓山服務所","仁武電竿場","仁武放置場","仁武檢修中心","橋頭施工課","高雄區處"],
  "鳳山區處":["昭明變電所","潮寮變電所","源海變電所","東亞變電所","築港變電所","漁港變電所","桃園服務所","林園服務所","小港服務所","小港倉庫","九曲服務所","九曲倉庫","旗山服務所","六龜服務所","仁武服務所","大寮服務所","美濃服務所","內門服務所","甲仙服務所","杉林服務所","鳳山服務所","協和宿舍","鳳山區處"],
  "南分處":["大林電廠","二橋倉庫","南分處"],
  "南施處":["南施處"]
};
let currentRecord=null;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function updateUnits(unitId,regionId){
  const r=document.getElementById(regionId).value;
  const u=document.getElementById(unitId);
  u.innerHTML='';
  if(!r){u.innerHTML='<option value="">請先選擇區處</option>';return;}
  u.innerHTML='<option value="">請選擇所別</option>';
  units[r].forEach(n=>{const o=document.createElement('option');o.textContent=n;u.appendChild(o);});
}

function statusBadge(s){
  const cls=s==='正常'?'s-normal':s==='待追蹤'?'s-watch':'s-pending';
  return `<span class="badge ${cls}">${s}</span>`;
}

async function loadRecords(){
  const unit=document.getElementById('q-unit').value;
  if(!unit){alert('請選擇所別');return;}
  const btn=document.getElementById('btn-load');
  btn.disabled=true;btn.textContent='載入中...';
  document.getElementById('query-result').innerHTML='<div class="loading">載入中...</div>';
  try{
    const res=await fetch(SHEET_URL+'?unit='+encodeURIComponent(unit));
    const data=await res.json();
    btn.disabled=false;btn.textContent='搜尋';
    if(!data.length){
      document.getElementById('query-result').innerHTML='<div class="empty">沒有找到記錄</div>';
      return;
    }
    const sorted=data.sort((a,b)=>new Date(b.repairDate)-new Date(a.repairDate));
    const ul=document.createElement('ul');
    ul.className='record-list';
    sorted.forEach(r=>{
      const li=document.createElement('li');
      li.className='record-item';
      const date=r.repairDate?String(r.repairDate).substring(0,10):'';
      li.innerHTML=`<div><div class="record-main">${r.location||''}</div><div class="record-sub">${date}　${r.categories||''}</div></div>${statusBadge(r.status)}`;
      li.onclick=()=>showDetail(r);
      ul.appendChild(li);
    });
    document.getElementById('query-result').innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:8px">共 ${data.length} 筆記錄</div>`;
    document.getElementById('query-result').appendChild(ul);
  }catch(err){
    btn.disabled=false;btn.textContent='搜尋';
    document.getElementById('query-result').innerHTML='<div class="empty">載入失敗，請確認網路</div>';
  }
}

function showDetail(r){
  currentRecord=r;
  const catList=['機械系統','安全防護','電氣系統','感應裝置'];
  const selectedCats=(r.categories||'').split('、');
  const date=r.repairDate?String(r.repairDate).substring(0,10):'';
  document.getElementById('detail-body').innerHTML=`
    <div class="field"><label class="field-label">區處</label><div style="font-size:15px;color:#111">${r.region||''}</div></div>
    <div class="field"><label class="field-label">所別</label><div style="font-size:15px;color:#111">${r.unit||''}</div></div>
    <div class="field"><label class="field-label">位置</label><input type="text" id="d-location" value="${r.location||''}"></div>
    <hr class="divider">
    <div class="field">
      <label class="field-label">故障類別（可複選）</label>
      <div class="checkbox-group" id="d-cats">
        ${catList.map(c=>`<label class="check-item"><input type="checkbox" value="${c}"${selectedCats.includes(c)?' checked':''}> ${c}</label>`).join('')}
      </div>
    </div>
    <div class="field"><label class="field-label">維修日期</label><input type="date" id="d-date" value="${date}"></div>
    <div class="field"><label class="field-label">故障描述</label><textarea id="d-fault">${r.faultDesc||''}</textarea></div>
    <div class="field"><label class="field-label">處理方式</label><textarea id="d-action">${r.actionTaken||''}</textarea></div>
    <hr class="divider">
    <div class="field">
      <label class="field-label">維修後狀態</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" name="d-status" value="正常"${r.status==='正常'?' checked':''}> <span class="status-normal">正常</span></label>
        <label class="radio-item"><input type="radio" name="d-status" value="待追蹤"${r.status==='待追蹤'?' checked':''}> <span class="status-watch">待追蹤</span></label>
        <label class="radio-item"><input type="radio" name="d-status" value="未處理"${r.status==='未處理'?' checked':''}> <span class="status-pending">未處理</span></label>
      </div>
    </div>
    <div class="error-msg" id="d-error">儲存失敗，請再試一次</div>
  `;
  showPage('page-detail');
}

async function saveEdit(){
  const loc=document.getElementById('d-location').value.trim();
  const date=document.getElementById('d-date').value;
  const cats=[...document.querySelectorAll('#d-cats input:checked')].map(c=>c.value);
  const fault=document.getElementById('d-fault').value.trim();
  const action=document.getElementById('d-action').value.trim();
  const status=document.querySelector('input[name="d-status"]:checked');
  if(!loc||!date||cats.length===0||!fault||!action||!status){alert('請填寫所有欄位');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='儲存中...';
  const payload={action:'update',timestamp:currentRecord.timestamp,region:currentRecord.region,unit:currentRecord.unit,location:loc,categories:cats.join('、'),repairDate:date,faultDesc:fault,actionTaken:action,status:status.value};
  try{
    await fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    btn.disabled=false;btn.textContent='儲存修改';
    alert('已儲存！');
    showPage('page-query');
  }catch(err){
    btn.disabled=false;btn.textContent='儲存修改';
    document.getElementById('d-error').style.display='block';
  }
}

async function submitForm(){
  const region=document.getElementById('region').value;
  const unit=document.getElementById('unit').value;
  const loc=document.getElementById('location').value.trim();
  const date=document.getElementById('repair-date').value;
  const cats=[...document.querySelectorAll('#cats-form input:checked')].map(c=>c.value);
  const fault=document.getElementById('fault-desc').value.trim();
  const action=document.getElementById('action-taken').value.trim();
  const status=document.querySelector('input[name="status"]:checked');
  if(!region||!unit||!loc||!date||cats.length===0||!fault||!action||!status){alert('請填寫所有欄位');return;}
  const btn=document.getElementById('submit-btn');
  const errMsg=document.getElementById('error-msg');
  btn.disabled=true;btn.textContent='送出中...';errMsg.style.display='none';
  const payload={region,unit,location:loc,categories:cats.join('、'),repairDate:date,faultDesc:fault,actionTaken:action,status:status.value};
  try{
    await fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    document.getElementById('form-body').style.display='none';
    document.getElementById('success-box').style.display='block';
    document.getElementById('success-detail').textContent=unit+' · '+loc+' · '+date;
  }catch(err){
    btn.disabled=false;btn.textContent='送出記錄';errMsg.style.display='block';
  }
}

function resetForm(){
  document.getElementById('region').value='';
  updateUnits('unit','region');
  document.getElementById('location').value='';
  document.querySelectorAll('#cats-form input').forEach(c=>c.checked=false);
  document.getElementById('fault-desc').value='';
  document.getElementById('action-taken').value='';
  document.querySelectorAll('input[name="status"]').forEach(r=>r.checked=false);
  document.getElementById('form-body').style.display='block';
  document.getElementById('success-box').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('submit-btn').textContent='送出記錄';
  document.getElementById('repair-date').value=new Date().toISOString().split('T')[0];
}
document.getElementById('repair-date').value=new Date().toISOString().split('T')[0];
</script>
</body>
</html>
